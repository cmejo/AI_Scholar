name: Auto Update

on:
  schedule:
    # Run weekly on Mondays at 3 AM UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install pip-tools
      run: |
        python -m pip install --upgrade pip
        pip install pip-tools

    - name: Update Python dependencies
      run: |
        # Create requirements.in if it doesn't exist
        if [ ! -f requirements.in ]; then
          cp requirements.txt requirements.in
        fi
        
        # Update dependencies
        pip-compile --upgrade requirements.in
        
        # Check if there are changes
        if git diff --quiet requirements.txt; then
          echo "No dependency updates available"
          echo "DEPS_UPDATED=false" >> $GITHUB_ENV
        else
          echo "Dependencies updated"
          echo "DEPS_UPDATED=true" >> $GITHUB_ENV
        fi

    - name: Run tests with updated dependencies
      if: env.DEPS_UPDATED == 'true'
      run: |
        pip install -r requirements.txt
        python -m pytest test_chatbot.py -v

    - name: Create Pull Request
      if: env.DEPS_UPDATED == 'true'
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "chore: update Python dependencies"
        title: "🔄 Auto-update Python dependencies"
        body: |
          ## 🔄 Automated Dependency Update
          
          This PR updates Python dependencies to their latest compatible versions.
          
          ### Changes
          - Updated `requirements.txt` with latest package versions
          - All tests pass with updated dependencies
          
          ### Review Checklist
          - [ ] Check for breaking changes in updated packages
          - [ ] Verify all tests still pass
          - [ ] Test the application manually
          - [ ] Review security advisories for updated packages
          
          **Auto-generated by GitHub Actions** 🤖
        branch: auto-update/dependencies
        delete-branch: true

  update-github-actions:
    name: Update GitHub Actions
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Update GitHub Actions
      uses: renovatebot/github-action@v39.1.1
      with:
        configurationFile: .github/renovate.json
        token: ${{ secrets.GITHUB_TOKEN }}

  security-updates:
    name: Security Updates
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install safety
      run: |
        pip install safety

    - name: Check for security vulnerabilities
      run: |
        pip install -r requirements.txt
        safety check --json --output security-report.json || true
        
        # Check if vulnerabilities were found
        if safety check; then
          echo "No security vulnerabilities found"
          echo "SECURITY_ISSUES=false" >> $GITHUB_ENV
        else
          echo "Security vulnerabilities found"
          echo "SECURITY_ISSUES=true" >> $GITHUB_ENV
        fi

    - name: Create security issue
      if: env.SECURITY_ISSUES == 'true'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          
          let reportContent = '';
          try {
            const report = JSON.parse(fs.readFileSync('security-report.json', 'utf8'));
            reportContent = JSON.stringify(report, null, 2);
          } catch (error) {
            reportContent = 'Failed to parse security report';
          }
          
          const issueBody = `## 🚨 Security Vulnerabilities Detected
          
          Automated security scan has detected vulnerabilities in project dependencies.
          
          ### Security Report
          \`\`\`json
          ${reportContent}
          \`\`\`
          
          ### Action Required
          - [ ] Review the security report
          - [ ] Update affected dependencies
          - [ ] Test the application with updated dependencies
          - [ ] Deploy security fixes
          
          **Auto-generated by GitHub Actions** 🤖
          `;
          
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '🚨 Security Vulnerabilities Detected',
            body: issueBody,
            labels: ['security', 'high-priority', 'automated']
          });

    - name: Upload security report
      if: env.SECURITY_ISSUES == 'true'
      uses: actions/upload-artifact@v3
      with:
        name: security-report
        path: security-report.json

  update-documentation:
    name: Update Documentation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Generate API documentation
      run: |
        pip install -r requirements.txt
        pip install pydoc-markdown
        
        # Generate API docs
        mkdir -p docs/api
        python -m pydoc app > docs/api/app.md || true

    - name: Update README badges
      run: |
        # Update version badge if needed
        if [ -f "app.py" ]; then
          VERSION=$(grep -o "version.*=.*['\"][^'\"]*['\"]" app.py | cut -d'"' -f2 || echo "1.0.0")
          sed -i "s/version-[^-]*-/version-$VERSION-/" README.md || true
        fi

    - name: Check for documentation updates
      run: |
        if git diff --quiet; then
          echo "No documentation updates needed"
          echo "DOCS_UPDATED=false" >> $GITHUB_ENV
        else
          echo "Documentation updated"
          echo "DOCS_UPDATED=true" >> $GITHUB_ENV
        fi

    - name: Create Pull Request for documentation
      if: env.DOCS_UPDATED == 'true'
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "docs: auto-update documentation"
        title: "📚 Auto-update documentation"
        body: |
          ## 📚 Automated Documentation Update
          
          This PR contains automated documentation updates.
          
          ### Changes
          - Updated API documentation
          - Refreshed README badges
          - Generated latest documentation
          
          **Auto-generated by GitHub Actions** 🤖
        branch: auto-update/documentation
        delete-branch: true

  cleanup-old-artifacts:
    name: Cleanup Old Artifacts
    runs-on: ubuntu-latest

    steps:
    - name: Delete old artifacts
      uses: actions/github-script@v6
      with:
        script: |
          const artifacts = await github.rest.actions.listArtifactsForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            per_page: 100
          });
          
          const cutoffDate = new Date();
          cutoffDate.setDate(cutoffDate.getDate() - 30); // Keep artifacts for 30 days
          
          for (const artifact of artifacts.data.artifacts) {
            const createdAt = new Date(artifact.created_at);
            if (createdAt < cutoffDate) {
              console.log(`Deleting artifact: ${artifact.name} (${artifact.created_at})`);
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id
              });
            }
          }

  health-check:
    name: Repository Health Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check repository health
      run: |
        echo "## Repository Health Check" > health-report.md
        echo "Generated on: $(date)" >> health-report.md
        echo "" >> health-report.md
        
        # Check file sizes
        echo "### Large Files" >> health-report.md
        find . -type f -size +1M -not -path "./chatbot_env/*" -not -path "./.git/*" | head -10 >> health-report.md || echo "No large files found" >> health-report.md
        echo "" >> health-report.md
        
        # Check for TODO/FIXME comments
        echo "### TODO/FIXME Items" >> health-report.md
        grep -r "TODO\|FIXME" --include="*.py" --include="*.js" --include="*.html" . | head -10 >> health-report.md || echo "No TODO/FIXME items found" >> health-report.md
        echo "" >> health-report.md
        
        # Check Python code quality
        echo "### Code Statistics" >> health-report.md
        echo "Python files: $(find . -name "*.py" -not -path "./chatbot_env/*" | wc -l)" >> health-report.md
        echo "JavaScript files: $(find . -name "*.js" -not -path "./chatbot_env/*" | wc -l)" >> health-report.md
        echo "Total lines of code: $(find . -name "*.py" -o -name "*.js" -o -name "*.html" -o -name "*.css" -not -path "./chatbot_env/*" | xargs wc -l | tail -1)" >> health-report.md

    - name: Upload health report
      uses: actions/upload-artifact@v3
      with:
        name: repository-health-report
        path: health-report.md