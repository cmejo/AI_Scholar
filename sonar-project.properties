# SonarCloud Configuration for AI Chatbot Web GUI

# Project identification
sonar.projectKey=ai-chatbot-web-gui
sonar.organization=your-organization
sonar.projectName=AI Chatbot Web GUI
sonar.projectVersion=1.0.0

# Source code
sonar.sources=.
sonar.exclusions=**/node_modules/**,**/chatbot_env/**,**/venv/**,**/env/**,**/__pycache__/**,**/dist/**,**/build/**

# Test coverage
sonar.python.coverage.reportPaths=coverage.xml
sonar.coverage.exclusions=**/test_*.py,**/tests/**,**/demo.py

# Language-specific settings
sonar.python.version=3.8,3.9,3.10,3.11,3.12

# Code analysis
sonar.python.pylint.reportPaths=pylint-report.json
sonar.python.bandit.reportPaths=bandit-report.json
sonar.python.flake8.reportPaths=flake8-report.json

# JavaScript/TypeScript settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.eslint.reportPaths=eslint-report.json

# Quality gate
sonar.qualitygate.wait=true

# Additional settings
sonar.sourceEncoding=UTF-8
sonar.scm.provider=git
sonar.links.homepage=https://github.com/your-username/ai-chatbot-web-gui
sonar.links.ci=https://github.com/your-username/ai-chatbot-web-gui/actions
sonar.links.scm=https://github.com/your-username/ai-chatbot-web-gui
sonar.links.issue=https://github.com/your-username/ai-chatbot-web-gui/issues